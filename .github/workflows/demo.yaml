name: K8s CBT S3Mover Demo

# This workflow supports two modes:
# 1. Local Minikube cluster (default) - Full block device support via VM
#    - Full CBT metadata API support
#    - Block device provisioning works correctly
#    - Same environment as upstream kubernetes-csi tests
#
# 2. Remote cluster (optional) - Use real Kubernetes cluster
#    - Set GitHub secret 'KUBECONFIG' with base64-encoded kubeconfig
#    - Enables testing on production-like environments
#    - Example: cat ~/.kube/config | base64 | pbcopy
#
# For local testing:
# - Automated (all-in-one): ./scripts/run-local-minikube.sh --non-interactive
# - Manual (step-by-step): Follow individual steps below
# - Requires: Minikube with VM driver (Docker Desktop or QEMU), not Podman
#
# See README.md for details

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  demo:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-backup-tool, build-restore-tool, lint]
    env:
      USE_REMOTE_CLUSTER: ${{ secrets.KUBECONFIG != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tools/cbt-backup/go.mod

      - name: Download backup tool artifact
        uses: actions/download-artifact@v4
        with:
          name: cbt-backup
          path: tools/cbt-backup

      - name: Download restore tool artifact
        uses: actions/download-artifact@v4
        with:
          name: cbt-restore
          path: tools/cbt-restore

      - name: Make tools executable
        run: |
          chmod +x tools/cbt-backup/cbt-backup
          chmod +x tools/cbt-restore/cbt-restore

      - name: Setup kubectl with remote cluster
        if: ${{ env.USE_REMOTE_CLUSTER == 'true' }}
        run: |
          echo "Using remote cluster from GitHub secrets..."
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          kubectl cluster-info
          kubectl get nodes

      - name: Setup Minikube
        if: ${{ env.USE_REMOTE_CLUSTER == 'false' }}
        uses: medyagh/setup-minikube@latest
        with:
          minikube-version: latest
          driver: docker
          cpus: 4
          memory: 8192
          kubernetes-version: v1.33.0
          container-runtime: containerd
          addons: storage-provisioner,default-storageclass

      - name: Verify Minikube cluster
        if: ${{ env.USE_REMOTE_CLUSTER == 'false' }}
        run: |
          echo "Verifying Minikube cluster..."
          kubectl cluster-info
          kubectl get nodes

      - name: Verify cluster
        run: |
          kubectl cluster-info
          kubectl get nodes
          kubectl version

      - name: Build and load container images into Minikube
        if: ${{ env.USE_REMOTE_CLUSTER == 'false' }}
        run: |
          echo "Building cbt-backup container image..."
          minikube image build -t cbt-backup:latest tools/cbt-backup

          echo "Building cbt-restore container image..."
          minikube image build -t cbt-restore:latest tools/cbt-restore

          echo "✓ Container images loaded into Minikube"
          minikube image ls | grep cbt || true

      - name: Install Snapshot CRDs
        run: |
          echo "Installing VolumeSnapshot CRDs..."
          kubectl apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/v8.4.0/client/config/crd/snapshot.storage.k8s.io_volumesnapshotclasses.yaml
          kubectl apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/v8.4.0/client/config/crd/snapshot.storage.k8s.io_volumesnapshotcontents.yaml
          kubectl apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/v8.4.0/client/config/crd/snapshot.storage.k8s.io_volumesnapshots.yaml
          kubectl apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/v8.4.0/client/config/crd/groupsnapshot.storage.k8s.io_volumegroupsnapshotclasses.yaml
          kubectl apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/v8.4.0/client/config/crd/groupsnapshot.storage.k8s.io_volumegroupsnapshotcontents.yaml
          kubectl apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/v8.4.0/client/config/crd/groupsnapshot.storage.k8s.io_volumegroupsnapshots.yaml

      - name: Deploy Snapshot Controller
        run: |
          echo "Deploying Snapshot Controller..."
          kubectl apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/v8.4.0/deploy/kubernetes/snapshot-controller/rbac-snapshot-controller.yaml
          kubectl apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/v8.4.0/deploy/kubernetes/snapshot-controller/setup-snapshot-controller.yaml

          echo "Waiting for snapshot-controller to be ready..."
          kubectl wait --for=condition=Available deployment/snapshot-controller -n kube-system --timeout=60s || {
            echo "Warning: snapshot-controller deployment not available, checking pods..."
            kubectl get pods -n kube-system -l app.kubernetes.io/name=snapshot-controller
            kubectl get deployment -n kube-system snapshot-controller
          }

          echo "✓ Snapshot Controller deployed"
          kubectl get pods -n kube-system -l app.kubernetes.io/name=snapshot-controller

      - name: Deploy CSI Driver with CBT
        run: |
          echo "Deploying CSI hostpath driver with Changed Block Tracking..."
          ./scripts/01-deploy-csi-driver.sh

          # Verify CBT CRD installation
          echo ""
          echo "Verifying SnapshotMetadataService CRD installation..."
          if kubectl get crd snapshotmetadataservices.cbt.storage.k8s.io &> /dev/null; then
            echo "✓ SnapshotMetadataService CRD is properly installed"
            kubectl get crd snapshotmetadataservices.cbt.storage.k8s.io
          else
            echo "⚠️ Warning: SnapshotMetadataService CRD not found"
            echo "CBT functionality may be limited"
          fi

      - name: Validate CBT Setup
        run: |
          echo "Validating CBT configuration..."
          ./scripts/validate-cbt.sh

      - name: Deploy MinIO
        run: |
          echo "Deploying MinIO S3 storage..."
          ./scripts/02-deploy-minio.sh

      - name: Verify MinIO
        run: |
          echo "Waiting for MinIO pod to be created..."
          timeout 60 bash -c 'until kubectl get pod -n cbt-demo -l app=minio 2>/dev/null | grep -q minio; do sleep 2; done' || {
            echo "MinIO pod not created within timeout"
            kubectl get pods -n cbt-demo
            exit 1
          }

          echo "Waiting for MinIO to be ready..."
          kubectl wait --for=condition=Ready pod -l app=minio -n cbt-demo --timeout=300s
          kubectl get pods -n cbt-demo -l app=minio

          echo "Verifying MinIO service..."
          kubectl get svc -n cbt-demo minio

      - name: Deploy Block Writer Workload
        run: |
          echo "Deploying block-writer workload with block PVC..."
          ./scripts/03-deploy-workload.sh

      - name: Verify Block Writer
        run: |
          echo "Waiting for block-writer pod to be ready..."
          kubectl wait --for=condition=Ready pod/block-writer -n cbt-demo --timeout=120s || {
            echo "Block-writer pod not ready within timeout"
            kubectl get pods -n cbt-demo
            kubectl get pvc -n cbt-demo
            kubectl describe pod block-writer -n cbt-demo
            exit 1
          }
          kubectl get pod block-writer -n cbt-demo

          echo "Verifying block-writer PVC..."
          kubectl get pvc -n cbt-demo block-writer-data

      - name: Check Backup Status
        run: |
          echo "Checking backup infrastructure status..."
          ./scripts/backup-status.sh

      - name: Run Integrity Check
        run: |
          echo "Running integrity checks..."
          ./scripts/integrity-check.sh

      - name: Write Initial Data to Block Device
        run: |
          echo "=========================================="
          echo "Writing Initial Data Pattern"
          echo "=========================================="
          echo ""
          echo "Writing random data at specific offsets to simulate application writes"
          echo "This matches the upstream test pattern and Red Hat's working example"
          echo ""

          # Write 5 blocks at seek positions 1, 3, 5, 7, 9 (matching Red Hat example)
          echo "Writing block at offset 4KB (seek=1)..."
          kubectl exec -n cbt-demo block-writer -- dd if=/dev/urandom of=/dev/xvda bs=4K count=20 seek=1 conv=notrunc oflag=direct

          echo "Writing block at offset 12KB (seek=3)..."
          kubectl exec -n cbt-demo block-writer -- dd if=/dev/urandom of=/dev/xvda bs=4K count=20 seek=3 conv=notrunc oflag=direct

          echo "Writing block at offset 20KB (seek=5)..."
          kubectl exec -n cbt-demo block-writer -- dd if=/dev/urandom of=/dev/xvda bs=4K count=20 seek=5 conv=notrunc oflag=direct

          echo "Writing block at offset 28KB (seek=7)..."
          kubectl exec -n cbt-demo block-writer -- dd if=/dev/urandom of=/dev/xvda bs=4K count=20 seek=7 conv=notrunc oflag=direct

          echo "Writing block at offset 36KB (seek=9)..."
          kubectl exec -n cbt-demo block-writer -- dd if=/dev/urandom of=/dev/xvda bs=4K count=20 seek=9 conv=notrunc oflag=direct

          # Ensure all writes are flushed to disk
          kubectl exec -n cbt-demo block-writer -- sync

          echo ""
          echo "✓ Written 100 blocks (~400KB total) at offsets: 4KB, 12KB, 20KB, 28KB, 36KB"
          echo ""

      - name: Create First Snapshot
        run: |
          echo "Creating first VolumeSnapshot..."

          # Get the actual PVC name
          PVC_NAME="block-writer-data"
          echo "PVC Name: $PVC_NAME"

          kubectl apply -f - <<EOF
          apiVersion: snapshot.storage.k8s.io/v1
          kind: VolumeSnapshot
          metadata:
            name: block-snapshot-1
            namespace: cbt-demo
          spec:
            volumeSnapshotClassName: csi-hostpath-snapclass
            source:
              persistentVolumeClaimName: $PVC_NAME
          EOF

          # Wait for snapshot to be ready (using kubectl wait with jsonpath - upstream best practice)
          echo "Waiting for snapshot 1 to be ready..."
          kubectl wait volumesnapshot block-snapshot-1 -n cbt-demo \
            --for=jsonpath='{.status.readyToUse}'=true --timeout=300s || {
            echo "✗ Snapshot did not become ready within timeout"
            kubectl get volumesnapshot block-snapshot-1 -n cbt-demo
            kubectl describe volumesnapshot block-snapshot-1 -n cbt-demo
            exit 1
          }
          echo "✓ Snapshot 1 is ready!"

      - name: Deploy Snapshot Metadata Lister
        run: |
          echo "Deploying snapshot-metadata-lister pod..."

          # Deploy RBAC resources
          kubectl apply -f manifests/snapshot-metadata-lister/rbac.yaml

          # Deploy the lister pod
          kubectl apply -f manifests/snapshot-metadata-lister/pod.yaml

          # Wait for pod to be ready
          echo "Waiting for csi-client pod to be ready..."
          kubectl wait --for=condition=Ready pod/csi-client -n cbt-demo --timeout=300s || {
            echo "✗ Pod did not become ready within timeout"
            kubectl get pod csi-client -n cbt-demo
            kubectl describe pod csi-client -n cbt-demo
            kubectl logs csi-client -n cbt-demo -c install-client || true
            exit 1
          }

          echo "✓ Snapshot metadata lister pod is ready!"
          kubectl get pod csi-client -n cbt-demo

      - name: Demonstrate GetMetadataAllocated
        run: |
          echo "=========================================="
          echo "CBT GetMetadataAllocated Demonstration"
          echo "=========================================="
          echo ""
          echo "This step demonstrates using the CBT GetMetadataAllocated API"
          echo "to identify and upload only allocated blocks, significantly"
          echo "reducing data transfer compared to full volume backup."
          echo ""

          # Get PVC name and snapshot info
          PVC_NAME="block-writer-data"
          SNAPSHOT_NAME="block-snapshot-1"

          echo "PVC: $PVC_NAME"
          echo "Snapshot: $SNAPSHOT_NAME"
          echo ""

          # Get volume size from VolumeSnapshot
          VOLUME_SIZE=$(kubectl get volumesnapshot $SNAPSHOT_NAME -n cbt-demo -o jsonpath='{.status.restoreSize}')
          echo "Volume Size: $VOLUME_SIZE"
          echo ""

          echo "=========================================="
          echo "Calling GetMetadataAllocated API"
          echo "=========================================="
          echo ""
          echo "Using snapshot-metadata-lister to query allocated blocks..."
          echo ""

          # Debug: Check if binary exists and works
          echo "Debug: Testing snapshot-metadata-lister binary..."
          kubectl exec -n cbt-demo csi-client -c run-client -- ls -lh /tools/snapshot-metadata-lister
          kubectl exec -n cbt-demo csi-client -c run-client -- /tools/snapshot-metadata-lister -h 2>&1 || echo "Help command exited with: $?"
          echo ""

          # Debug: Check SnapshotMetadataService configuration
          echo "Debug: Checking SnapshotMetadataService CR..."
          kubectl get snapshotmetadataservices -A -o yaml
          echo ""

          # Debug: Check network connectivity to SnapshotMetadataService
          echo "Debug: Checking network connectivity to SnapshotMetadataService..."
          kubectl exec -n cbt-demo csi-client -c run-client -- nc -zv csi-snapshot-metadata.default 6443 2>&1 || {
            echo "⚠ Cannot reach csi-snapshot-metadata.default:6443"
            echo "Checking if service exists..."
            kubectl get svc -n default csi-snapshot-metadata || echo "Service not found"
          }
          echo ""

          # Use the snapshot-metadata-lister to get allocated blocks
          echo "Calling GetMetadataAllocated API (matching upstream integration test)..."
          echo "Command: /tools/snapshot-metadata-lister -snapshot $SNAPSHOT_NAME -namespace cbt-demo -starting-offset 0 -max-results 10 -kubeconfig \"\""
          echo ""
          kubectl exec -n cbt-demo csi-client -c run-client -- /tools/snapshot-metadata-lister \
            -snapshot "$SNAPSHOT_NAME" \
            -namespace cbt-demo \
            -starting-offset 0 \
            -max-results 10 \
            -kubeconfig "" 2>&1 | tee /tmp/lister-output.log || {
            EXIT_CODE=$?
            echo "Exit code: $EXIT_CODE"
            cat /tmp/lister-output.log
            echo ""
            echo "⚠ GetMetadataAllocated call failed"
            echo "  This may happen if:"
            echo "  1. The CSI driver doesn't implement the CBT metadata APIs"
            echo "  2. The SnapshotMetadataService is not available"
            echo "  3. The snapshot is not in a ready state"
          }

          # Show CSI driver logs for debugging (always, not just on failure)
          echo ""
          echo "=========================================="
          echo "CSI Driver Logs (for debugging)"
          echo "=========================================="
          kubectl logs -n default csi-hostpathplugin-0 --all-containers --tail=100 || true
          echo ""
          echo "=========================================="
          echo "Expected Behavior with Full CBT Support"
          echo "=========================================="
          echo ""
          echo "With a CBT-enabled CSI driver, this would show:"
          echo ""
          echo "Volume Size:        1 GB   (total PVC size)"
          echo "Allocated Blocks:   ~400 KB  (100 blocks of random data)"
          echo "Data Transferred:   ~400 KB  (only allocated blocks)"
          echo "Savings:            ~1 GB  (99.96%)"
          echo ""
          echo "This demonstrates the power of Changed Block Tracking:"
          echo "- Only allocated blocks are transferred"
          echo "- Sparse regions are identified and skipped"
          echo "- Incremental backups transfer only changed blocks"
          echo ""

      - name: Verify GetMetadataAllocated with snapshot-metadata-verifier
        run: |
          echo "=========================================="
          echo "Verifying GetMetadataAllocated Correctness"
          echo "=========================================="
          echo ""
          echo "Using upstream snapshot-metadata-verifier to validate"
          echo "that CBT metadata matches actual block device contents."
          echo ""

          # Create source PVC restored from snapshot-1
          kubectl apply -f manifests/snapshot-metadata-verifier/source-pvc.yaml

          # Create empty target PVC
          kubectl apply -f manifests/snapshot-metadata-verifier/target-pvc.yaml

          # Wait for PVCs to be bound
          echo "Waiting for verifier PVCs to be bound..."
          kubectl wait --for=jsonpath='{.status.phase}'=Bound pvc/verifier-source -n cbt-demo --timeout=120s
          kubectl wait --for=jsonpath='{.status.phase}'=Bound pvc/verifier-target -n cbt-demo --timeout=120s

          # Deploy verifier pod
          kubectl apply -f manifests/snapshot-metadata-verifier/pod.yaml

          echo "Waiting for verifier pod to be ready..."
          kubectl wait --for=condition=Ready pod/cbt-verifier -n cbt-demo --timeout=300s || {
            echo "Verifier pod not ready"
            kubectl describe pod cbt-verifier -n cbt-demo
            kubectl logs cbt-verifier -n cbt-demo -c install-tools || true
            exit 1
          }

          echo ""
          echo "Running snapshot-metadata-verifier for GetMetadataAllocated..."
          kubectl exec -n cbt-demo cbt-verifier -c run-verifier -- /tools/snapshot-metadata-verifier \
            -snapshot block-snapshot-1 \
            -namespace cbt-demo \
            -source-device-path /dev/source \
            -target-device-path /dev/target \
            -kubeconfig "" || {
            echo ""
            echo "Verifier exited with error - metadata may not match device contents"
            echo "This could indicate a CSI driver issue"
          }

          echo ""
          echo "GetMetadataAllocated verification complete"

      - name: Negative test - verify mismatch detection
        run: |
          echo "=========================================="
          echo "Negative Test: Verify Mismatch Detection"
          echo "=========================================="
          echo ""
          echo "Writing additional data to target device to create intentional mismatch."
          echo "The verifier should FAIL after this write."
          echo ""

          # Write extra data to target to create mismatch
          kubectl exec -n cbt-demo cbt-verifier -c run-verifier -- \
            dd if=/dev/urandom of=/dev/target bs=4K count=1 oflag=direct 2>/dev/null

          echo "Running verifier again - expecting FAILURE..."
          if kubectl exec -n cbt-demo cbt-verifier -c run-verifier -- /tools/snapshot-metadata-verifier \
            -snapshot block-snapshot-1 \
            -namespace cbt-demo \
            -source-device-path /dev/source \
            -target-device-path /dev/target \
            -kubeconfig "" 2>&1; then
            echo ""
            echo "UNEXPECTED: Verifier succeeded despite data mismatch!"
            echo "This may indicate the verifier is not checking block contents properly."
          else
            echo ""
            echo "EXPECTED: Verifier correctly detected data mismatch"
          fi

          # Cleanup verifier resources for delta test
          echo ""
          echo "Cleaning up verifier resources..."
          kubectl delete pod cbt-verifier -n cbt-demo --wait=true || true
          kubectl delete pvc verifier-source verifier-target -n cbt-demo --wait=true || true

      - name: Write More Data for Incremental Backup
        run: |
          echo "=========================================="
          echo "Writing Additional Data for Delta Demo"
          echo "=========================================="
          echo ""
          echo "Writing more random data at different offsets to demonstrate incremental changes"
          echo "This simulates application writes between backup snapshots"
          echo ""

          # Write 5 more blocks at different positions (matching Red Hat delta pattern)
          echo "Writing block at offset 60KB (seek=15)..."
          kubectl exec -n cbt-demo block-writer -- dd if=/dev/urandom of=/dev/xvda bs=4K count=20 seek=15 conv=notrunc oflag=direct

          echo "Writing block at offset 68KB (seek=17)..."
          kubectl exec -n cbt-demo block-writer -- dd if=/dev/urandom of=/dev/xvda bs=4K count=20 seek=17 conv=notrunc oflag=direct

          echo "Writing block at offset 76KB (seek=19)..."
          kubectl exec -n cbt-demo block-writer -- dd if=/dev/urandom of=/dev/xvda bs=4K count=20 seek=19 conv=notrunc oflag=direct

          echo "Writing block at offset 84KB (seek=21)..."
          kubectl exec -n cbt-demo block-writer -- dd if=/dev/urandom of=/dev/xvda bs=4K count=20 seek=21 conv=notrunc oflag=direct

          echo "Writing block at offset 92KB (seek=23)..."
          kubectl exec -n cbt-demo block-writer -- dd if=/dev/urandom of=/dev/xvda bs=4K count=20 seek=23 conv=notrunc oflag=direct

          # Ensure all writes are flushed to disk
          kubectl exec -n cbt-demo block-writer -- sync

          echo ""
          echo "✓ Written 100 more blocks (~400KB total) at new offsets: 60KB, 68KB, 76KB, 84KB, 92KB"
          echo "Total data written across both writes: 200 blocks (~800KB)"
          echo ""

      - name: Create second snapshot for delta demo
        run: |
          echo "Creating second VolumeSnapshot for delta testing..."

          # Get the actual PVC name
          PVC_NAME="block-writer-data"
          echo "PVC Name: $PVC_NAME"

          kubectl apply -f - <<EOF
          apiVersion: snapshot.storage.k8s.io/v1
          kind: VolumeSnapshot
          metadata:
            name: block-snapshot-2
            namespace: cbt-demo
          spec:
            volumeSnapshotClassName: csi-hostpath-snapclass
            source:
              persistentVolumeClaimName: $PVC_NAME
          EOF

          # Wait for snapshot 2 to be ready
          echo "Waiting for snapshot 2 to be ready..."
          kubectl wait volumesnapshot block-snapshot-2 -n cbt-demo \
            --for=jsonpath='{.status.readyToUse}'=true --timeout=300s || {
            echo "✗ Snapshot did not become ready within timeout"
            kubectl get volumesnapshot block-snapshot-2 -n cbt-demo
            kubectl describe volumesnapshot block-snapshot-2 -n cbt-demo
            exit 1
          }
          echo "✓ Snapshot 2 is ready!"

          echo ""
          echo "Testing CBT API with both snapshot name and CSI handle..."
          echo ""
          echo "Note: PR kubernetes-csi/external-snapshot-metadata#180 added support for using"
          echo "CSI snapshot handles in addition to snapshot names."
          echo ""

          # Get CSI snapshot handle from VolumeSnapshotContent
          VSC_NAME=$(kubectl get volumesnapshot block-snapshot-1 -n cbt-demo -o jsonpath="{.status.boundVolumeSnapshotContentName}")
          echo "VolumeSnapshotContent for VolumeSnapshot block-snapshot-1 is [$VSC_NAME]"

          SNAP_HANDLE=$(kubectl get volumesnapshotcontent $VSC_NAME -o jsonpath="{.status.snapshotHandle}")
          echo "CSI snapshot handle of VolumeSnapshot block-snapshot-1 is [$SNAP_HANDLE]"

          echo ""
          echo "The snapshots now capture different states:"
          echo "  - Snapshot 1: Initial data (100 rows)"
          echo "  - Snapshot 2: After inserting 100 additional rows (~10MB of changes)"
          echo ""

          echo "=========================================="
          echo "Demonstrating GetMetadataDelta API"
          echo "=========================================="
          echo ""
          echo "Testing GetMetadataDelta with snapshot names..."
          kubectl exec -n cbt-demo csi-client -c run-client -- /tools/snapshot-metadata-lister \
            -previous-snapshot block-snapshot-1 \
            -snapshot block-snapshot-2 \
            -namespace cbt-demo \
            -starting-offset 0 \
            -max-results 10 \
            -kubeconfig "" || {
            echo ""
            echo "⚠ GetMetadataDelta with snapshot names failed"
            echo "Trying with CSI handle..."
          }

          echo ""
          echo "=========================================="
          echo "Testing GetMetadataDelta with CSI handle (PR #180)"
          echo "=========================================="
          echo ""
          echo "Using -previous-snapshot-id flag with CSI snapshot handle..."
          kubectl exec -n cbt-demo csi-client -c run-client -- /tools/snapshot-metadata-lister \
            -previous-snapshot-id "$SNAP_HANDLE" \
            -snapshot block-snapshot-2 \
            -namespace cbt-demo \
            -starting-offset 0 \
            -max-results 10 \
            -kubeconfig "" || {
            echo ""
            echo "⚠ GetMetadataDelta with CSI handle failed"
            echo "This feature requires PR #180 to be merged and built from @main"
          }
          echo ""
          echo "Snapshot details:"
          kubectl get volumesnapshot block-snapshot-1 -n cbt-demo -o yaml
          kubectl get volumesnapshot block-snapshot-2 -n cbt-demo -o yaml

      - name: Verify GetMetadataDelta with snapshot-metadata-verifier
        run: |
          echo "=========================================="
          echo "Verifying GetMetadataDelta Correctness"
          echo "=========================================="
          echo ""

          # Create source PVC restored from snapshot-2 (newer)
          kubectl apply -f - <<PVEOF
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: verifier-source
            namespace: cbt-demo
          spec:
            storageClassName: csi-hostpath-sc
            volumeMode: Block
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
            dataSource:
              name: block-snapshot-2
              kind: VolumeSnapshot
              apiGroup: snapshot.storage.k8s.io
          PVEOF

          # Create target PVC restored from snapshot-1 (older/base)
          kubectl apply -f - <<PVEOF
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: verifier-target
            namespace: cbt-demo
          spec:
            storageClassName: csi-hostpath-sc
            volumeMode: Block
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
            dataSource:
              name: block-snapshot-1
              kind: VolumeSnapshot
              apiGroup: snapshot.storage.k8s.io
          PVEOF

          # Wait for PVCs
          echo "Waiting for verifier PVCs to be bound..."
          kubectl wait --for=jsonpath='{.status.phase}'=Bound pvc/verifier-source -n cbt-demo --timeout=120s
          kubectl wait --for=jsonpath='{.status.phase}'=Bound pvc/verifier-target -n cbt-demo --timeout=120s

          # Deploy verifier pod
          kubectl apply -f manifests/snapshot-metadata-verifier/pod.yaml

          echo "Waiting for verifier pod to be ready..."
          kubectl wait --for=condition=Ready pod/cbt-verifier -n cbt-demo --timeout=300s || {
            echo "Verifier pod not ready"
            kubectl describe pod cbt-verifier -n cbt-demo
            kubectl logs cbt-verifier -n cbt-demo -c install-tools || true
            exit 1
          }

          echo ""
          echo "Running snapshot-metadata-verifier for GetMetadataDelta..."
          kubectl exec -n cbt-demo cbt-verifier -c run-verifier -- /tools/snapshot-metadata-verifier \
            -snapshot block-snapshot-2 \
            -previous-snapshot block-snapshot-1 \
            -namespace cbt-demo \
            -source-device-path /dev/source \
            -target-device-path /dev/target \
            -kubeconfig "" || {
            echo ""
            echo "Delta verifier exited with error"
          }

          # Cleanup verifier resources
          echo ""
          echo "Cleaning up verifier resources..."
          kubectl delete pod cbt-verifier -n cbt-demo --wait=true || true
          kubectl delete pvc verifier-source verifier-target -n cbt-demo --wait=true || true

          echo ""
          echo "GetMetadataDelta verification complete"

      - name: Test Restore Dry Run
        run: |
          echo "Testing restore dry run..."
          ./scripts/restore-dry-run.sh cbt-demo block-snapshot-1

      - name: Run cbt-backup in-cluster
        if: ${{ env.USE_REMOTE_CLUSTER == 'false' }}
        run: |
          echo "=========================================="
          echo "Running cbt-backup as in-cluster Job"
          echo "=========================================="

          # Deploy backup RBAC
          kubectl apply -f manifests/backup-restore/rbac.yaml

          # Stop block-writer to release the PVC (ReadWriteOnce)
          echo "Stopping block-writer to release PVC..."
          kubectl delete pod block-writer -n cbt-demo --wait=true

          # Run the backup job
          echo "Starting cbt-backup job..."
          kubectl apply -f manifests/backup-restore/backup-job.yaml

          # Wait for job to complete
          echo "Waiting for backup job to complete..."
          kubectl wait --for=condition=Complete job/cbt-backup -n cbt-demo --timeout=300s || {
            echo "Backup job did not complete, checking status..."
            kubectl get job cbt-backup -n cbt-demo
            kubectl describe job cbt-backup -n cbt-demo
            kubectl logs job/cbt-backup -n cbt-demo || true
            echo ""
            echo "⚠ Backup job failed - this may be expected if CBT gRPC is not reachable"
          }

          echo ""
          echo "Backup job logs:"
          kubectl logs job/cbt-backup -n cbt-demo || true

      - name: Run cbt-restore list in-cluster
        if: ${{ env.USE_REMOTE_CLUSTER == 'false' }}
        run: |
          echo "=========================================="
          echo "Running cbt-restore list as in-cluster Job"
          echo "=========================================="

          kubectl apply -f manifests/backup-restore/list-job.yaml

          echo "Waiting for list job to complete..."
          kubectl wait --for=condition=Complete job/cbt-restore-list -n cbt-demo --timeout=120s || {
            echo "List job did not complete"
            kubectl logs job/cbt-restore-list -n cbt-demo || true
          }

          echo ""
          echo "List job output:"
          kubectl logs job/cbt-restore-list -n cbt-demo || true

      - name: Run cbt-restore in-cluster
        if: ${{ env.USE_REMOTE_CLUSTER == 'false' }}
        run: |
          echo "=========================================="
          echo "Running cbt-restore as in-cluster Job"
          echo "=========================================="

          # Get the actual snapshot name from the backup (auto-generated name)
          BACKUP_SNAPSHOT=$(kubectl logs job/cbt-backup -n cbt-demo | grep "Snapshot Name:" | awk '{print $NF}')
          if [ -z "$BACKUP_SNAPSHOT" ]; then
            echo "Could not determine backup snapshot name from logs, skipping restore"
            exit 0
          fi
          echo "Restoring from backup snapshot: $BACKUP_SNAPSHOT"

          # Create target PVC for restore
          kubectl apply -f manifests/backup-restore/restore-pvc.yaml

          echo "Waiting for restore PVC to be bound..."
          kubectl wait --for=jsonpath='{.status.phase}'=Bound pvc/restored-data -n cbt-demo --timeout=60s || {
            echo "Restore PVC not bound, checking status..."
            kubectl get pvc restored-data -n cbt-demo
          }

          # Create restore job dynamically with the correct snapshot name
          cat manifests/backup-restore/restore-job.yaml | \
            sed "s/--snapshot=block-snapshot-1/--snapshot=$BACKUP_SNAPSHOT/" | \
            kubectl apply -f -

          echo "Waiting for restore job to complete..."
          kubectl wait --for=condition=Complete job/cbt-restore -n cbt-demo --timeout=300s || {
            echo "Restore job did not complete"
            kubectl describe job cbt-restore -n cbt-demo
            kubectl logs job/cbt-restore -n cbt-demo || true
          }

          echo ""
          echo "Restore job logs:"
          kubectl logs job/cbt-restore -n cbt-demo || true

          # Restart block-writer
          echo ""
          echo "Restarting block-writer..."
          kubectl apply -f manifests/workload/block-writer-pod.yaml
          kubectl wait --for=condition=Ready pod/block-writer -n cbt-demo --timeout=120s || true

      - name: Collect Logs on Failure
        if: failure()
        run: |
          echo "========================================"
          echo "Collecting diagnostic information..."
          echo "========================================"

          echo ""
          echo "All resources across namespaces:"
          kubectl get all -A

          echo ""
          echo "Detailed pod information:"
          kubectl get po -A --show-labels

          echo ""
          echo "VolumeSnapshots:"
          kubectl get volumesnapshot -A

          echo ""
          echo "VolumeSnapshotContents:"
          kubectl get volumesnapshotcontent

          echo ""
          echo "PVCs:"
          kubectl get pvc -A

          echo ""
          echo "PVs:"
          kubectl get pv

          echo ""
          echo "StorageClasses:"
          kubectl get storageclass

          echo ""
          echo "VolumeSnapshotClasses:"
          kubectl get volumesnapshotclass

          echo ""
          echo "SnapshotMetadataServices:"
          kubectl get snapshotmetadataservices -A || echo "CRD not installed"

          echo ""
          echo "========================================"
          echo "Snapshot Controller Logs:"
          echo "========================================"
          kubectl logs -n kube-system -l app.kubernetes.io/name=snapshot-controller --tail=100 || true
          kubectl describe deployment -n kube-system snapshot-controller || true

          echo ""
          echo "========================================"
          echo "CSI Driver Logs:"
          echo "========================================"
          kubectl logs -n default csi-hostpathplugin-0 --all-containers --tail=100 || true

          echo ""
          echo "CSI Driver Pod Description:"
          kubectl describe pod -n default csi-hostpathplugin-0 || true

          echo ""
          echo "========================================"
          echo "MinIO Logs:"
          echo "========================================"
          kubectl logs -n cbt-demo -l app=minio --tail=100 || true
          kubectl describe pod -n cbt-demo -l app=minio || true

          echo ""
          echo "========================================"
          echo "Block Writer Logs:"
          echo "========================================"
          kubectl logs -n cbt-demo block-writer --tail=100 || true
          kubectl describe pod -n cbt-demo block-writer || true

      - name: Cleanup local Minikube cluster
        if: always() && env.USE_REMOTE_CLUSTER == 'false'
        run: |
          echo "Cleaning up local Minikube cluster..."
          minikube delete || true

      - name: Cleanup remote cluster resources
        if: always() && env.USE_REMOTE_CLUSTER == 'true'
        run: |
          echo "Cleaning up resources from remote cluster..."
          kubectl delete namespace cbt-demo --ignore-not-found=true || true
          echo "Remote cluster preserved, only namespace removed"

  build-backup-tool:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tools/cbt-backup/go.mod

      - name: Download dependencies
        working-directory: tools/cbt-backup
        run: |
          echo "Downloading Go dependencies and updating go.sum..."
          go mod tidy

          # Retry on failure (network issues)
          if [ $? -ne 0 ]; then
            echo "First attempt failed, retrying..."
            sleep 5
            go mod tidy
          fi

      - name: Build backup tool
        working-directory: tools/cbt-backup
        run: |
          echo "Building backup tool..."
          go build -v -o cbt-backup ./cmd

          echo "Testing binary..."
          ./cbt-backup --help

          echo "Verifying commands..."
          ./cbt-backup create --help
          ./cbt-backup list --help

      - name: Test backup tool
        working-directory: tools/cbt-backup
        run: |
          echo "Running tests..."
          go test -v ./... || {
            echo "Note: Tests may fail if there are no test files yet"
            echo "This is expected for a demo project"
            exit 0
          }

      - name: Upload backup tool artifact
        uses: actions/upload-artifact@v4
        with:
          name: cbt-backup
          path: tools/cbt-backup/cbt-backup
          retention-days: 1

  build-restore-tool:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tools/cbt-restore/go.mod

      - name: Build restore tool
        run: |
          cd tools/cbt-restore
          go mod download
          go build -v -o cbt-restore ./cmd
          echo ""
          echo "✓ Restore tool built successfully"

      - name: Test restore tool
        run: |
          cd tools/cbt-restore
          go test -v ./...

      - name: Verify restore tool CLI
        run: |
          ./tools/cbt-restore/cbt-restore --help

      - name: Upload restore tool artifact
        uses: actions/upload-artifact@v4
        with:
          name: cbt-restore
          path: tools/cbt-restore/cbt-restore
          retention-days: 1

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tools/cbt-backup/go.mod

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          ignore_paths: '.git'
          severity: warning

      - name: Lint backup tool
        working-directory: tools/cbt-backup
        run: |
          go fmt ./...
          go vet ./...
