apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: verifier-source
  namespace: cbt-demo
spec:
  accessModes:
  - ReadWriteOnce
  volumeMode: Block
  storageClassName: csi-hostpath-sc
  resources:
    requests:
      storage: 1Gi
  dataSource:
    kind: VolumeSnapshot
    apiGroup: snapshot.storage.k8s.io
    name: block-snapshot-1
