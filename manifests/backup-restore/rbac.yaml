---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cbt-backup-sa
  namespace: cbt-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cbt-backup-role
rules:
# Snapshot management
- apiGroups: ["snapshot.storage.k8s.io"]
  resources: ["volumesnapshots"]
  verbs: ["get", "list", "watch", "create"]
- apiGroups: ["snapshot.storage.k8s.io"]
  resources: ["volumesnapshotcontents", "volumesnapshotclasses"]
  verbs: ["get", "list", "watch"]
# CBT metadata service discovery
- apiGroups: ["cbt.storage.k8s.io"]
  resources: ["snapshotmetadataservices"]
  verbs: ["get", "list", "watch"]
# PVC/PV info
- apiGroups: [""]
  resources: ["persistentvolumeclaims", "persistentvolumes"]
  verbs: ["get", "list"]
# Service account token for gRPC auth
- apiGroups: [""]
  resources: ["serviceaccounts/token"]
  verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cbt-backup-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cbt-backup-role
subjects:
- kind: ServiceAccount
  name: cbt-backup-sa
  namespace: cbt-demo
